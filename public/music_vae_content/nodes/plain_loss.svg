<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 228" width="100%" height="100%">
  <defs>
    <filter id="shadow-loss" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="grad-loss" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#fff1f2" />
    </linearGradient>
  </defs>

  <rect width="400" height="228" fill="#ffffff" />

  <rect x="40" y="24" width="320" height="180" rx="12" fill="url(#grad-loss)" stroke="#e11d48" stroke-width="2" filter="url(#shadow-loss)"/>

  <text x="200" y="52" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#9f1239" text-anchor="middle" letter-spacing="0.5">Reconstruction Loss</text>

  <rect x="52" y="66" width="296" height="62" rx="8" fill="#ffffff" stroke="#fda4af" stroke-width="2" stroke-dasharray="4 2"/>
  <text x="200" y="106" font-family="Cambria Math, Times New Roman, serif" font-size="16" font-weight="500" text-anchor="middle" fill="#9f1239">
    <tspan>𝓛</tspan><tspan font-size="10" baseline-shift="sub">CE</tspan><tspan> = −</tspan><tspan>𝔼</tspan><tspan>[ </tspan>
    <tspan font-size="17">∑</tspan><tspan font-size="10" baseline-shift="sub">t</tspan><tspan> log </tspan>
    <tspan font-style="italic">P</tspan><tspan font-size="10" baseline-shift="sub">θ</tspan><tspan>(</tspan>
    <tspan font-style="italic">X</tspan><tspan font-size="10" baseline-shift="sub">t</tspan><tspan> ∣ </tspan>
    <tspan font-style="italic">X</tspan><tspan font-size="9" baseline-shift="sub">1:t−1</tspan><tspan>, </tspan>
    <tspan font-style="italic">C</tspan><tspan font-size="9" baseline-shift="sub">k(t)</tspan><tspan> ) ]</tspan>
  </text>

  <text x="200" y="152" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#334155" text-anchor="middle">Cross-Entropy Objective</text>
  <text x="200" y="174" font-family="system-ui, sans-serif" font-size="13" font-weight="400" fill="#475569" text-anchor="middle">
    Token-wise negative log-likelihood of ground-truth <tspan font-family="Georgia, serif" font-style="italic">X</tspan>
  </text>
</svg>
