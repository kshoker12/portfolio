<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 880" width="100%" preserveAspectRatio="xMidYMid meet" style="background-color: #ffffff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
  <defs>
    <marker id="arrow-slate" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#334155" />
    </marker>
    <marker id="arrow-purple" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#7E22CE" />
    </marker>
<marker id="arrow-pink" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#DB2777" />
    </marker>
    <marker id="arrow-green" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#059669" />
    </marker>
    <marker id="arrow-blue" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#0284C7" />
    </marker>
    
    <filter id="shadow-md" x="-10%" y="-10%" width="125%" height="125%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.1" />
    </filter>
    <filter id="shadow-sm" x="-10%" y="-10%" width="125%" height="125%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15" />
    </filter>
  </defs>

  <style>
    text, tspan {
      text-rendering: geometricPrecision;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    .text-title { font-weight: 700; font-size: 25px; fill: #0F172A; }
    .text-label { font-weight: 600; font-size: 17px; fill: #334155; }
    .math { font-family: 'STIX Two Math', 'Cambria Math', 'Latin Modern Math', 'Times New Roman', serif; font-weight: 500; }
    .math-attr { font-family: 'STIX Two Math', 'Cambria Math', 'Latin Modern Math', 'Times New Roman', serif; font-size: 27px; font-weight: 500; }
    .math-attr-sub { font-size: 17px; baseline-shift: sub; }
    .math-attr-sup { font-size: 14px; baseline-shift: super; font-weight: 600; }
    .path-data { fill: none; stroke: #334155; stroke-width: 3; stroke-linejoin: round; }
    .path-feedback { fill: none; stroke: #334155; stroke-width: 3; stroke-linejoin: round; stroke-dasharray: 8 6; }
  </style>

  <!-- User-Defined -->
  <path class="path-data" d="M 360 395 L 360 430" marker-end="url(#arrow-slate)" />
  <rect x="285" y="359" width="150" height="36" fill="#ffffff" rx="4" />
  <text x="360" y="383" font-size="17" class="text-label" text-anchor="middle">User-Defined</text>

  <!-- Embeddings to Linear to C_k -->
  <path class="path-data" d="M 360 730 L 360 740" marker-end="url(#arrow-slate)" />
  <path class="path-data" d="M 355 780 L 375 780" marker-end="url(#arrow-slate)" />

  <!-- C_k to Decoder via FiLM -->
  <path d="M 403 736 L 403 690 L 360 690 L 360 222" fill="none" stroke="#7E22CE" stroke-width="4" stroke-linejoin="round" marker-end="url(#arrow-purple)" />
  <rect x="323" y="698" width="160" height="36" fill="#ffffff" rx="4" />
  <text x="403" y="722" font-size="17" font-weight="700" fill="#7E22CE" text-anchor="middle">FiLM Injection</text>

  <!-- Token History: prior generated tokens feed decoder input -->
  <path class="path-feedback" d="M 290 315 L 120 315 L 120 55 L 358 55 L 358 38" marker-end="url(#arrow-slate)" />
  <rect x="20" y="287" width="200" height="36" fill="#ffffff" rx="4" />
  <text x="120" y="311" font-size="17" class="text-label" text-anchor="middle">Token History <tspan class="math" font-style="italic">X</tspan><tspan class="math" font-style="italic" font-size="13" baseline-shift="sub">1:t−1</tspan></text>

  <!-- Decoder to X' -->
  <path class="path-data" d="M 360 220 L 360 255" marker-end="url(#arrow-slate)" />
  <rect x="310" y="226" width="100" height="36" fill="#ffffff" rx="4" />
  <text x="360" y="250" font-size="17" class="text-label" text-anchor="middle">Generate</text>

  <g transform="translate(110, 430)">
    <rect x="0" y="0" width="500" height="300" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="2" stroke-dasharray="6 4" rx="12" />
    <text x="250" y="40" class="text-title" text-anchor="middle">Discrete Attribute Embeddings</text>
    
    <text x="100" y="96" class="math-attr" fill="#DB2777" text-anchor="end">
      <tspan font-style="italic">a</tspan><tspan class="math-attr-sub">k</tspan>
    </text>
    <text x="102" y="88" class="math-attr-sup" fill="#DB2777" text-anchor="start">rhym</text>
    <rect x="140" y="75" width="80" height="30" fill="#FCE7F3" stroke="#DB2777" stroke-width="1.5" rx="4" />
    <text x="180" y="96" font-size="17" font-weight="bold" fill="#DB2777" text-anchor="middle">0 … 7</text>
    <path d="M 230 90 L 260 90" fill="none" stroke="#DB2777" stroke-width="2" marker-end="url(#arrow-pink)" />
    <rect x="275" y="75" width="20" height="30" fill="#BE185D" rx="2" />
    
    <text x="100" y="146" class="math-attr" fill="#059669" text-anchor="end">
      <tspan font-style="italic">a</tspan><tspan class="math-attr-sub">k</tspan>
    </text>
    <text x="102" y="138" class="math-attr-sup" fill="#059669" text-anchor="start">poly</text>
    <rect x="140" y="125" width="80" height="30" fill="#D1FAE5" stroke="#059669" stroke-width="1.5" rx="4" />
    <text x="180" y="146" font-size="17" font-weight="bold" fill="#059669" text-anchor="middle">0 … 7</text>
    <path d="M 230 140 L 260 140" fill="none" stroke="#059669" stroke-width="2" marker-end="url(#arrow-green)" />
    <rect x="275" y="125" width="20" height="30" fill="#047857" rx="2" />
    
    <text x="100" y="196" class="math-attr" fill="#0284C7" text-anchor="end">
      <tspan font-style="italic">a</tspan><tspan class="math-attr-sub">k</tspan>
    </text>
    <text x="102" y="188" class="math-attr-sup" fill="#0284C7" text-anchor="start">vel</text>
    <rect x="140" y="175" width="80" height="30" fill="#E0F2FE" stroke="#0284C7" stroke-width="1.5" rx="4" />
    <text x="180" y="196" font-size="17" font-weight="bold" fill="#0284C7" text-anchor="middle">0 … 7</text>
    <path d="M 230 190 L 260 190" fill="none" stroke="#0284C7" stroke-width="2" marker-end="url(#arrow-blue)" />
    <rect x="275" y="175" width="20" height="30" fill="#0369A1" rx="2" />
    
    <text x="100" y="246" class="math-attr" fill="#7E22CE" text-anchor="end">
      <tspan font-style="italic">a</tspan><tspan class="math-attr-sub">k</tspan>
    </text>
    <text x="102" y="238" class="math-attr-sup" fill="#7E22CE" text-anchor="start">den</text>
    <rect x="140" y="225" width="80" height="30" fill="#F3E8FF" stroke="#7E22CE" stroke-width="1.5" rx="4" />
    <text x="180" y="246" font-size="17" font-weight="bold" fill="#7E22CE" text-anchor="middle">0 … 7</text>
    <path d="M 230 240 L 260 240" fill="none" stroke="#7E22CE" stroke-width="2" marker-end="url(#arrow-purple)" />
    <rect x="275" y="225" width="20" height="30" fill="#6B21A8" rx="2" />

    <path d="M 295 90 L 335 90" fill="none" stroke="#64748B" stroke-width="3" />
    <path d="M 295 140 L 335 140" fill="none" stroke="#64748B" stroke-width="3" />
    <path d="M 295 190 L 335 190" fill="none" stroke="#64748B" stroke-width="3" />
    <path d="M 295 240 L 335 240" fill="none" stroke="#64748B" stroke-width="3" />
    <path d="M 335 90 L 335 240" fill="none" stroke="#64748B" stroke-width="3" />
    <path d="M 335 165 L 388 165" fill="none" stroke="#64748B" stroke-width="3" />

    <g transform="translate(388, 121)">
      <rect x="0" y="0" width="36" height="22" fill="#BE185D" rx="2" />
      <rect x="0" y="22" width="36" height="22" fill="#047857" rx="2" />
      <rect x="0" y="44" width="36" height="22" fill="#0369A1" rx="2" />
      <rect x="0" y="66" width="36" height="22" fill="#6B21A8" rx="2" />
      <rect x="0" y="0" width="36" height="88" fill="none" stroke="#0F172A" stroke-width="2" rx="3" />
    </g>

    <text x="406" y="232" font-size="31" class="math" fill="#0F172A" text-anchor="middle">
      <tspan font-style="italic">A</tspan><tspan font-size="20" baseline-shift="sub">k</tspan><tspan> ∈ </tspan><tspan>ℝ</tspan><tspan font-size="18" baseline-shift="super">128</tspan>
    </text>
  </g>

  <g transform="translate(235, 740)">
    <rect x="0" y="0" width="120" height="80" fill="#ffffff" stroke="#0F172A" stroke-width="2.5" rx="8" filter="url(#shadow-sm)" />
    <text x="60" y="46" font-size="21" font-weight="bold" fill="#0F172A" text-anchor="middle">Linear</text>
  </g>

  <g transform="translate(375, 736)">
    <rect x="0" y="0" width="56" height="88" fill="#7E22CE" stroke="#5B21B6" stroke-width="2.5" rx="6" filter="url(#shadow-sm)" />
    <text x="28" y="116" font-size="29" class="math" fill="#7E22CE" text-anchor="middle">
      <tspan font-style="italic">C</tspan><tspan font-size="19" baseline-shift="sub">k</tspan><tspan> ∈ </tspan><tspan>ℝ</tspan><tspan font-size="17" baseline-shift="super">512</tspan>
    </text>
  </g>

  <g transform="translate(220, 40)">
    <rect x="0" y="0" width="280" height="180" fill="#FAF5FF" stroke="#7E22CE" stroke-width="3" rx="16" filter="url(#shadow-md)" />
    <text x="140" y="60" class="text-title" fill="#4C1D95" text-anchor="middle">Transformer Decoder</text>
    <text x="140" y="90" font-size="17" class="text-label" fill="#7E22CE" text-anchor="middle">(Autoregressive Generation)</text>
    
    <path d="M 60 140 L 220 140" fill="none" stroke="#7E22CE" stroke-width="4" marker-end="url(#arrow-purple)" />
  </g>

  <g transform="translate(290, 255)">
    <rect x="40" y="0" width="100" height="120" fill="#ffffff" stroke="#0F172A" stroke-width="2" />
    <text x="55" y="40" font-size="33" fill="#0F172A">♫</text>
    <text x="90" y="95" font-size="16" class="text-label" text-anchor="middle">Bar K</text>
    
    <rect x="20" y="30" width="100" height="120" fill="#ffffff" stroke="#0F172A" stroke-width="2" />
    <text x="35" y="70" font-size="33" fill="#0F172A">♫</text>
    <text x="70" y="125" font-size="16" class="text-label" text-anchor="middle">Bar 2</text>
    
    <rect x="0" y="60" width="100" height="120" fill="#ffffff" stroke="#0F172A" stroke-width="2" filter="url(#shadow-sm)" />
    <text x="15" y="100" font-size="33" fill="#0F172A">♫</text>
    <text x="50" y="155" font-size="16" class="text-label" text-anchor="middle">Bar 1</text>
    
    <text x="60" y="235" font-size="27" class="math" fill="#0F172A" text-anchor="middle">
      <tspan font-style="italic">X′</tspan><tspan font-style="normal"> = { </tspan>
      <tspan font-style="italic">X′</tspan><tspan font-size="18" baseline-shift="sub">1</tspan><tspan font-style="normal">, …, </tspan>
      <tspan font-style="italic">X′</tspan><tspan font-size="18" baseline-shift="sub">K</tspan><tspan font-style="normal"> }</tspan>
    </text>
  </g>

</svg>
