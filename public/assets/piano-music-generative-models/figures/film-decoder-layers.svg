<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 258" width="1100" height="258">
  <rect width="1100" height="258" fill="#ffffff"/>
  <style>
    .text-main { font-family: 'Times New Roman', Times, serif; fill: #0f172a; font-size: 15px; }
    .text-bold { font-family: 'Times New Roman', Times, serif; fill: #0f172a; font-size: 16px; font-weight: bold; }
    .text-small { font-family: 'Times New Roman', Times, serif; fill: #334155; font-size: 13px; }
    .text-math { font-family: 'Times New Roman', Times, serif; font-style: italic; }
    .layer-box { fill: #f8fafc; stroke: #64748b; stroke-width: 1.5; stroke-dasharray: 5,5; rx: 8; }
    .cond-box { fill: #eff6ff; stroke: #1e40af; stroke-width: 2; rx: 6; }
    .film-box { fill: #dbeafe; stroke: #2563eb; stroke-width: 2; rx: 4; }
    .op-box { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.5; rx: 4; }
    .arrow-line { stroke: #334155; stroke-width: 2; fill: none; }
    .cond-line { stroke: #2563eb; stroke-width: 2; fill: none; stroke-dasharray: 4,4; }
  </style>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <marker id="arrow-cond" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
  </defs>

  <rect class="cond-box" x="150" y="20" width="800" height="40"/>
  <text class="text-bold" x="550" y="45" text-anchor="middle">Per-Bar Condition Vector <tspan class="text-math">C</tspan><tspan class="text-math" dy="4" font-size="12px">k</tspan></text>

  <rect class="layer-box" x="50" y="90" width="280" height="160"/>
  <rect class="op-box" x="70" y="125" width="60" height="80"/>
  <text class="text-small" x="100" y="165" text-anchor="middle">Layer<tspan x="100" dy="16">Norm</tspan></text>
  <path class="arrow-line" d="M 130 165 L 155 165" marker-end="url(#arrow)"/>
  <rect class="film-box" x="160" y="125" width="60" height="80"/>
  <text class="text-main" x="190" y="165" text-anchor="middle" font-weight="bold" fill="#1e40af">FiLM<tspan x="190" dy="16" font-size="13px" font-weight="normal">(&#947;, &#946;)</tspan></text>
  <path class="arrow-line" d="M 220 165 L 245 165" marker-end="url(#arrow)"/>
  <rect class="op-box" x="250" y="125" width="60" height="80"/>
  <text class="text-small" x="280" y="157" text-anchor="middle">Masked<tspan x="280" dy="16">Self-</tspan><tspan x="280" dy="16">Attn</tspan></text>
  <text class="text-bold" x="190" y="235" text-anchor="middle">Decoder Layer 1</text>

  <rect class="layer-box" x="380" y="90" width="280" height="160"/>
  <rect class="op-box" x="400" y="125" width="60" height="80"/>
  <text class="text-small" x="430" y="165" text-anchor="middle">Layer<tspan x="430" dy="16">Norm</tspan></text>
  <path class="arrow-line" d="M 460 165 L 485 165" marker-end="url(#arrow)"/>
  <rect class="film-box" x="490" y="125" width="60" height="80"/>
  <text class="text-main" x="520" y="165" text-anchor="middle" font-weight="bold" fill="#1e40af">FiLM<tspan x="520" dy="16" font-size="13px" font-weight="normal">(&#947;, &#946;)</tspan></text>
  <path class="arrow-line" d="M 550 165 L 575 165" marker-end="url(#arrow)"/>
  <rect class="op-box" x="580" y="125" width="60" height="80"/>
  <text class="text-small" x="610" y="157" text-anchor="middle">Masked<tspan x="610" dy="16">Self-</tspan><tspan x="610" dy="16">Attn</tspan></text>
  <text class="text-bold" x="520" y="235" text-anchor="middle">Decoder Layer 2</text>

  <text class="text-bold" x="720" y="175" text-anchor="middle" font-size="28px" fill="#64748b">...</text>

  <rect class="layer-box" x="770" y="90" width="280" height="160"/>
  <rect class="op-box" x="790" y="125" width="60" height="80"/>
  <text class="text-small" x="820" y="165" text-anchor="middle">Layer<tspan x="820" dy="16">Norm</tspan></text>
  <path class="arrow-line" d="M 850 165 L 875 165" marker-end="url(#arrow)"/>
  <rect class="film-box" x="880" y="125" width="60" height="80"/>
  <text class="text-main" x="910" y="165" text-anchor="middle" font-weight="bold" fill="#1e40af">FiLM<tspan x="910" dy="16" font-size="13px" font-weight="normal">(&#947;, &#946;)</tspan></text>
  <path class="arrow-line" d="M 940 165 L 965 165" marker-end="url(#arrow)"/>
  <rect class="op-box" x="970" y="125" width="60" height="80"/>
  <text class="text-small" x="1000" y="157" text-anchor="middle">Masked<tspan x="1000" dy="16">Self-</tspan><tspan x="1000" dy="16">Attn</tspan></text>
  <text class="text-bold" x="910" y="235" text-anchor="middle">Decoder Layer L</text>

  <path class="arrow-line" d="M 10 165 L 45 165" marker-end="url(#arrow)"/>
  <text class="text-math" x="30" y="150" text-anchor="middle">X<tspan dy="4" font-size="11px">&lt;t</tspan></text>

  <path class="arrow-line" d="M 330 165 L 375 165" marker-end="url(#arrow)"/>
  <path class="arrow-line" d="M 660 165 L 685 165" marker-end="url(#arrow)"/>
  <path class="arrow-line" d="M 755 165 L 765 165" marker-end="url(#arrow)"/>

  <path class="arrow-line" d="M 1050 165 L 1090 165" marker-end="url(#arrow)"/>
  <text class="text-math" x="1070" y="150" text-anchor="middle">X<tspan dy="4" font-size="11px">t</tspan></text>

  <path class="cond-line" d="M 190 60 L 190 120" marker-end="url(#arrow-cond)"/>
  <path class="cond-line" d="M 520 60 L 520 120" marker-end="url(#arrow-cond)"/>
  <path class="cond-line" d="M 910 60 L 910 120" marker-end="url(#arrow-cond)"/>
</svg>
