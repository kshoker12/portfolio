<svg xmlns="http://www.w3.org/2000/svg" width="720" height="518.4" viewBox="0 0 720 518.4">
  <rect x="0" y="0" width="720" height="518.4" fill="#ffffff"/>

  <!-- Extra vertical space + more room around the lower conditioning arrow -->
  <g transform="translate(0, 20)">
    <!-- Nodes -->
    <circle cx="210" cy="120" r="56" fill="#ffffff" stroke="#111111" stroke-width="3.2"/>
    <!-- Deterministic bar-level latents z_{1:K} (double-bordered) -->
    <circle cx="210" cy="290" r="56" fill="#ffffff" stroke="#111111" stroke-width="3.2"/>
    <circle cx="210" cy="290" r="64" fill="none" stroke="#111111" stroke-width="3.2"/>

    <!-- Observed tokens (shaded) -->
    <circle cx="570" cy="290" r="56" fill="#e5e7eb" stroke="#111111" stroke-width="3.2"/>
    <circle cx="570" cy="120" r="56" fill="#e5e7eb" stroke="#111111" stroke-width="3.2"/>

    <!-- Condition box (pushed down for a longer arrow) -->
    <rect x="490" y="386" width="170" height="82" rx="16" fill="#ffffff" stroke="#111111" stroke-width="3.2"/>

    <!-- Arrows -->
    <line x1="210" y1="176" x2="210" y2="234" stroke="#111111" stroke-width="3.2"/>
    <polygon points="210,234 200,218 220,218" fill="#111111"/>

    <line x1="266" y1="290" x2="510" y2="290" stroke="#111111" stroke-width="3.2"/>
    <polygon points="510,290 494,280 494,300" fill="#111111"/>

    <line x1="575" y1="386" x2="575" y2="346" stroke="#111111" stroke-width="3.2"/>
    <polygon points="575,346 565,362 585,362" fill="#111111"/>

    <line x1="570" y1="176" x2="570" y2="234" stroke="#111111" stroke-width="3.2"/>
    <polygon points="570,234 560,218 580,218" fill="#111111"/>

    <!-- Labels -->
    <text x="210" y="134" text-anchor="middle" font-family="Times New Roman, Times, serif" font-size="44">Z<tspan baseline-shift="sub" font-size="28">p</tspan></text>
    <text x="210" y="304" text-anchor="middle" font-family="Times New Roman, Times, serif" font-size="44">Z<tspan baseline-shift="sub" font-size="28">1:K</tspan></text>
    <text x="570" y="138" text-anchor="middle" font-family="Times New Roman, Times, serif" font-size="44">X<tspan baseline-shift="sub" font-size="28">&lt;T</tspan></text>
    <text x="570" y="304" text-anchor="middle" font-family="Times New Roman, Times, serif" font-size="44">X<tspan baseline-shift="sub" font-size="28">T</tspan></text>
    <text x="575" y="440" text-anchor="middle" font-family="Times New Roman, Times, serif" font-size="38">A<tspan baseline-shift="sub" font-size="24">1:K</tspan></text>
  </g>
</svg>

