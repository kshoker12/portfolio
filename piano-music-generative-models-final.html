<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎵 Piano Music Generative Models</title>
    <!-- Marked.js for markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>
    <!-- Prism.js for syntax highlighting -->
    <link href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-core.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>
    <!-- MathJax for math rendering -->
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script>
        // MathJax configuration MUST be defined before the loader script runs
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true,
                processEnvironments: true
            },
            options: {
                skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code']
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
                'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
                sans-serif;
            background: #f5f5f5;
            color: #1a1a1a;
            padding: 24px 18px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
        }

        .container {
            width: 100%;
            margin: 0 0;
            background: white;
            padding: 32px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            line-height: 1.55;
            font-size: 15px;
        }

        mjx-container {
            font-size: 105%;
        }

        h1, h2, h3, h4, h5, h6 {
            margin-top: 14px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        h1 {
            font-size: 2em;
            border-bottom: 1px solid #eaecef;
            padding-bottom: 9px;
        }

        h2 {
            font-size: 1.5em;
            border-bottom: 1px solid #eaecef;
            padding-bottom: 9px;
        }

        h3 {
            font-size: 1.25em;
        }

        p {
            margin-bottom: 8px;
        }

        ul, ol {
            margin-bottom: 8px;
            padding-left: 22px;
        }

        li {
            margin-bottom: 2px;
        }

        blockquote {
            margin: 8px 0;
            padding: 0 1em;
            color: #6a737d;
            border-left: 0.25em solid #dfe2e5;
        }

        code {
            background: #f6f8fa;
            border-radius: 3px;
            padding: 2px 6px;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 0.85em;
        }

        pre {
            background: #2d2d2d;
            border-radius: 6px;
            padding: 10px;
            overflow: auto;
            margin-bottom: 8px;
        }

        pre code {
            background: transparent;
            padding: 0;
            color: #f8f8f2;
        }

        figure.table-figure {
            margin: 24px 0;
        }

        table {
            border-collapse: collapse;
            margin: 8px 0;
            width: 100%;
        }

        th, td {
            border: 1px solid #dfe2e5;
            padding: 3px 8px;
        }

        th {
            background: #f6f8fa;
            font-weight: 600;
        }

        a {
            color: #0366d6;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .reference-entry {
            margin-bottom: 1.25em;
            line-height: 1.55;
        }

        .reference-entry strong a {
            color: inherit;
            font-weight: 600;
            text-decoration: none;
        }

        .reference-entry strong a:hover {
            text-decoration: underline;
        }

        img {
            max-width: 100%;
            height: auto;
            border-radius: 4px;
            margin: 8px 0;
        }

        figure {
            margin: 16px auto;
            text-align: center;
            max-width: 100%;
            width: 100%;
        }

        figure > img {
            display: block;
            width: 100%;
            max-width: 100%;
            height: auto;
            margin-left: auto;
            margin-right: auto;
        }

        /*
         * Architecture SVGs: largest diagram (542px artboard) fills the content column;
         * others scale by intrinsic width ratio (e.g. 378/542 inference vs train).
         */
        figure.arch-diagram {
            container-type: inline-size;
            width: 100%;
        }

        figure.arch-diagram > img {
            width: calc(var(--intrinsic-w, 542) * 100cqw / 542);
            max-width: 100%;
            height: auto;
        }

        figcaption {
            margin: 10px auto 0;
            max-width: 100%;
            width: 100%;
            padding: 0;
            text-align: center;
            color: #57606a;
            font-size: 14px;
            line-height: 1.65;
            overflow: visible;
            overflow-wrap: break-word;
            word-wrap: break-word;
        }

        figcaption.plates-caption {
            max-width: 100%;
            width: 100%;
            line-height: 1.65;
        }

        figcaption mjx-container {
            display: inline !important;
            max-width: 100%;
            margin: 0;
            overflow: visible;
            white-space: normal;
        }

        figcaption .fig-label {
            font-weight: 600;
            color: #24292f;
        }

        .plates-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(260px, 1fr));
            gap: 22px;
            align-items: start;
        }

        @media (max-width: 920px) {
            .plates-grid {
                grid-template-columns: repeat(2, minmax(240px, 1fr));
            }
        }

        @media (max-width: 640px) {
            .plates-grid {
                grid-template-columns: 1fr;
            }
        }

        .plate-panel {
            border: 1px solid #e6e8eb;
            border-radius: 14px;
            background: linear-gradient(180deg, #ffffff 0%, #fbfcfd 100%);
            padding: 8px;
            box-shadow:
                0 1px 2px rgba(0,0,0,0.06),
                0 10px 24px rgba(0,0,0,0.06);
        }

        .plate-panel img {
            display: block;
            width: 100%;
            height: auto;
            max-height: 680px;
            object-fit: contain;
            margin: 0;
            border-radius: 12px;
            background: #ffffff;
            cursor: zoom-in;
            border: 1px solid #eef0f2;
        }

        .plate-subcaption {
            margin-top: 12px;
            text-align: center;
            color: #24292f;
            font-weight: 600;
        }

        .plate-subcaption span {
            color: #57606a;
            font-weight: 600;
        }

        /* Lightbox */
        .lightbox {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.72);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 24px;
            z-index: 9999;
        }

        .lightbox.is-open {
            display: flex;
        }

        .lightbox-inner {
            width: min(1200px, 96vw);
            max-height: 92vh;
            background: #ffffff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 16px 48px rgba(0,0,0,0.35);
        }

        .lightbox-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            border-bottom: 1px solid #eaecef;
            font-size: 15px;
            color: #24292f;
        }

        .lightbox-toolbar a {
            font-size: 13px;
        }

        .lightbox-close {
            border: 1px solid #d0d7de;
            background: #f6f8fa;
            border-radius: 8px;
            padding: 6px 10px;
            cursor: pointer;
            font-weight: 600;
        }

        .lightbox-body {
            padding: 16px;
            max-height: calc(92vh - 52px);
            overflow: auto;
            background: #ffffff;
        }

        .lightbox-body img {
            display: block;
            width: 100%;
            height: auto;
            max-height: 78vh;
            object-fit: contain;
            margin: 0 auto;
        }

        hr {
            border: 0;
            border-top: 1px solid #eaecef;
            margin: 10px 0;
        }
        
        html {
            scroll-behavior: smooth;
        }
    </style>
</head>
<body>
    <div class="container" id="content">
        <p>Loading markdown...</p>
    </div>

    <script>
        // Configure marked options (let Prism handle highlighting after render)
        marked.setOptions({
            breaks: true,
            gfm: true
        });

        const contentDiv = document.getElementById('content');

        const numberFigures = (root) => {
            const figures = Array.from(root.querySelectorAll('figure:not(.table-figure)'));
            let n = 0;

            figures.forEach((fig) => {
                const caption = fig.querySelector('figcaption');
                if (!caption) return;

                n += 1;

                if (!fig.id) fig.id = `fig-${n}`;

                if (caption.dataset.rawHtml == null) {
                    caption.dataset.rawHtml = caption.innerHTML;
                }

                caption.innerHTML = `<span class="fig-label">Figure ${n}.</span> ${caption.dataset.rawHtml}`;
            });
        };

        const numberTables = (root) => {
            const tables = Array.from(root.querySelectorAll('figure.table-figure'));
            let n = 0;

            const hasManualTableLabel = (html) => /Table\s+[A-Z]\d+\.?/i.test(html);

            tables.forEach((fig) => {
                const caption = fig.querySelector('figcaption');
                if (!caption) return;

                if (caption.dataset.rawHtml == null) {
                    caption.dataset.rawHtml = caption.innerHTML;
                }

                const raw = caption.dataset.rawHtml;

                if (hasManualTableLabel(raw)) {
                    const match = raw.match(/Table\s+([A-Z]\d+)/i);
                    if (!fig.id && match) fig.id = `table-${match[1].toLowerCase()}`;
                    caption.innerHTML = raw;
                    return;
                }

                n += 1;

                if (!fig.id) fig.id = `tab-${n}`;

                caption.innerHTML = `<span class="fig-label">Table ${n}.</span> ${raw}`;
            });
        };

        const fixRawHtmlMath = (html) => html
            .replace(/\\\\\(/g, '\\(')
            .replace(/\\\\\)/g, '\\)')
            .replace(/\\\\\{/g, '\\{')
            .replace(/\\\\\}/g, '\\}')
            .replace(/X_\{<t\}/g, 'X_{\\lt t}');

        const normalizeRawHtmlMath = (root) => {
            // Raw HTML blocks pass through markdown escapes; fix \\( … \\) for MathJax.
            root.querySelectorAll('figcaption, figure.table-figure th, figure.table-figure td, .reference-entry').forEach((el) => {
                el.innerHTML = fixRawHtmlMath(el.innerHTML);
            });
        };

        const repairInlineMath = (root) => {
            // Marked/GFM can corrupt inline math in list items (e.g. <em> from _{k=1}).
            // Never inject raw "<" into innerHTML (x_{<t} becomes an HTML tag and eats the rest).
            root.innerHTML = root.innerHTML.replace(/\\\(([\s\S]*?)\\\)/g, (_, inner) => {
                const fixed = inner
                    .replace(/<\/?em>/gi, '')
                    .replace(/&#95;/g, '_');
                return `\\(${fixed}\\)`;
            });
        };

        const repairDisplayMath = (root) => {
            // GFM can also corrupt display math (e.g. _{k=1} → <em>{k=1}</em>).
            root.innerHTML = root.innerHTML.replace(/\$\$([\s\S]*?)\$\$/g, (_, inner) => {
                const fixed = inner
                    .replace(/<\/?em>/gi, '')
                    .replace(/&#95;/g, '_');
                return `$$${fixed}$$`;
            });
        };

        const typesetMath = async (root) => {
            if (!(window.MathJax && window.MathJax.typesetPromise)) return false;
            try {
                await window.MathJax.typesetPromise([root]);
                return true;
            } catch (err) {
                console.error('MathJax rendering error:', err);
                return false;
            }
        };

        const typesetMathWhenReady = (root, timeoutMs = 20000) => {
            const start = Date.now();

            const tick = async () => {
                // Prefer MathJax startup promise when available.
                if (window.MathJax && window.MathJax.startup && window.MathJax.startup.promise) {
                    try {
                        await window.MathJax.startup.promise;
                    } catch (_) {}
                }

                const ok = await typesetMath(root);
                if (ok) return;
                if (Date.now() - start > timeoutMs) return;
                window.setTimeout(tick, 200);
            };

            tick();
        };

        const setupLightbox = (root) => {
            let lb = document.getElementById('lightbox');
            if (!lb) {
                lb = document.createElement('div');
                lb.id = 'lightbox';
                lb.className = 'lightbox';
                lb.innerHTML = `
                    <div class="lightbox-inner" role="dialog" aria-modal="true" aria-label="Figure viewer">
                        <div class="lightbox-toolbar">
                            <div id="lightbox-title">Figure</div>
                            <div style="display:flex; gap:10px; align-items:center;">
                                <a id="lightbox-open" href="#" target="_blank" rel="noopener noreferrer">Open in new tab</a>
                                <button class="lightbox-close" id="lightbox-close" type="button">Close</button>
                            </div>
                        </div>
                        <div class="lightbox-body">
                            <img id="lightbox-img" alt="" />
                        </div>
                    </div>
                `;
                document.body.appendChild(lb);
            }

            const close = () => lb.classList.remove('is-open');
            lb.addEventListener('click', (e) => {
                if (e.target === lb) close();
            });
            const closeBtn = lb.querySelector('#lightbox-close');
            if (closeBtn) closeBtn.onclick = close;
            window.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') close();
            });

            root.querySelectorAll('.plate-panel img').forEach((img) => {
                img.addEventListener('click', () => {
                    const src = img.getAttribute('src') || '';
                    const alt = img.getAttribute('alt') || 'Figure';
                    const title = img.closest('.plate-panel')?.querySelector('.plate-subcaption')?.textContent?.trim() || alt;
                    const lbImg = lb.querySelector('#lightbox-img');
                    const lbTitle = lb.querySelector('#lightbox-title');
                    const lbOpen = lb.querySelector('#lightbox-open');
                    if (lbImg) {
                        lbImg.src = src;
                        lbImg.alt = alt;
                    }
                    if (lbTitle) lbTitle.textContent = title;
                    if (lbOpen) lbOpen.href = src;
                    lb.classList.add('is-open');
                });
            });
        };

        // Fetch and render markdown from file
        fetch('piano-music-generative-models-final.md')
            .then(response => response.text())
            .then(markdown => {
                contentDiv.innerHTML = marked.parse(markdown);

                contentDiv.querySelectorAll('.reference-entry a[href^="http"]').forEach((a) => {
                    a.target = '_blank';
                    a.rel = 'noopener noreferrer';
                });

                const slugCounts = {};
                const toSlug = (text) => {
                    return (text || '')
                        .toLowerCase()
                        .trim()
                        .replace(/\s+/g, '-')
                        .replace(/[^a-z0-9\-]/g, '')
                        .replace(/\-+/g, '-')
                        .replace(/^\-+|\-+$/g, '');
                };

                const headings = contentDiv.querySelectorAll('h1,h2,h3,h4,h5,h6');
                headings.forEach((h) => {
                    const base = toSlug(h.textContent);
                    let slug = base;
                    if (slugCounts[base] != null) {
                        slugCounts[base] += 1;
                        slug = `${base}-${slugCounts[base]}`;
                    } else {
                        slugCounts[base] = 0;
                    }
                    if (!h.id) h.id = slug;
                });

                // Replace images pointing to video files with HTML5 video players
                const imgs = contentDiv.querySelectorAll('img');
                imgs.forEach((img) => {
                    let src = img.getAttribute('src') || '';
                    if (/\.(mp4|mov|webm)$/i.test(src)) {
                        if (src.startsWith('/')) src = src.replace(/^\//, '');

                        const makeSource = (url) => {
                            const s = document.createElement('source');
                            s.src = url;
                            const ext = (url.split('.').pop() || '').toLowerCase();
                            s.type = ext === 'mp4' ? 'video/mp4' : ext === 'webm' ? 'video/webm' : ext === 'mov' ? 'video/quicktime' : '';
                            return s;
                        };

                        const video = document.createElement('video');
                        video.setAttribute('controls', '');
                        video.setAttribute('playsinline', '');
                        video.setAttribute('preload', 'metadata');
                        video.style.width = '70%';
                        video.style.maxWidth = '70%';
                        video.style.borderRadius = '6px';

                        video.appendChild(makeSource(src));
                        if (!/\.mp4$/i.test(src)) {
                            video.appendChild(makeSource(src.replace(/\.(mov|webm)$/i, '.mp4')));
                        }

                        const fallback = document.createElement('div');
                        fallback.style.fontSize = '14px';
                        fallback.style.marginTop = '8px';
                        fallback.innerHTML = `
                            <p>
                                Unable to play this video in your browser?
                                <a href="${src}" download>Download video</a>
                            </p>
                        `;
                        video.appendChild(fallback);

                        img.replaceWith(video);
                    }
                });

                // Normalize in-page anchor hrefs to our slug format
                const pageLinks = contentDiv.querySelectorAll('a[href^="#"]');
                pageLinks.forEach((a) => {
                    const rawHash = a.getAttribute('href');
                    const rawId = decodeURIComponent((rawHash || '').replace(/^#/, ''));
                    if (!rawId) return;
                    const normalized = `#${toSlug(rawId)}`;
                    a.setAttribute('href', normalized);
                });

                contentDiv.addEventListener('click', (e) => {
                    const link = e.target.closest && e.target.closest('a[href^="#"]');
                    if (!link) return;
                    const hash = decodeURIComponent(link.getAttribute('href'));
                    if (!hash || hash === '#' || hash.startsWith('#!')) return;
                    const id = hash.slice(1);
                    const normalizedId = toSlug(id);
                    const el = document.getElementById(normalizedId) || document.getElementById(id);
                    if (el) {
                        e.preventDefault();
                        el.scrollIntoView({ behavior: 'smooth', block: 'start' });
                        try { history.replaceState(null, '', `#${normalizedId}`); } catch (_) {}
                    }
                });

                // Architecture figures: native width from HTML attrs × shared viewport scale
                contentDiv.querySelectorAll('figure.arch-diagram img[width]').forEach((img) => {
                    const w = parseInt(img.getAttribute('width'), 10);
                    if (Number.isFinite(w) && w > 0) {
                        img.style.setProperty('--intrinsic-w', String(w));
                    }
                });

                // Auto-number figure and table captions
                numberFigures(contentDiv);
                numberTables(contentDiv);

                // Raw HTML blocks need single-backslash MathJax delimiters.
                normalizeRawHtmlMath(contentDiv);

                repairInlineMath(contentDiv);
                repairDisplayMath(contentDiv);

                // Run Prism syntax highlighting on all code blocks within the content
                if (window.Prism && typeof window.Prism.highlightAllUnder === 'function') {
                    window.Prism.highlightAllUnder(contentDiv);
                }

                // Render math equations with MathJax (wait until MathJax is loaded)
                typesetMathWhenReady(contentDiv);

                // Enable click-to-zoom for plate diagrams
                setupLightbox(contentDiv);
            })
            .catch(error => {
                contentDiv.innerHTML = `<p style="color: red;">Error loading markdown file: ${error.message}</p>`;
            });
    </script>
</body>
</html>
