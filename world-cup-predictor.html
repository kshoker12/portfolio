<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Cup 2026 Predictor - Documentation</title>
    <!-- Marked.js for markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>
    <!-- Prism.js for syntax highlighting -->
    <link href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-core.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>
    <!-- MathJax for math rendering -->
    <script>
        // MathJax configuration MUST be defined before the loader script runs
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true,
                processEnvironments: true
            },
            options: {
                skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code']
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
                'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
                sans-serif;
            background: #f5f5f5;
            color: #333;
            padding: 24px 18px;
        }

        .container {
            width: 100%;
            margin: 0 0;
            background: white;
            padding: 32px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            line-height: 1.5;
            font-size: 14px;
        }

        h1, h2, h3, h4, h5, h6 {
            margin-top: 14px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        h1 {
            font-size: 2em;
            border-bottom: 1px solid #eaecef;
            padding-bottom: 9px;
        }

        h2 {
            font-size: 1.5em;
            border-bottom: 1px solid #eaecef;
            padding-bottom: 9px;
        }

        h3 {
            font-size: 1.25em;
        }

        p {
            margin-bottom: 8px;
        }

        ul, ol {
            margin-bottom: 8px;
            padding-left: 22px;
        }

        li {
            margin-bottom: 2px;
        }

        blockquote {
            margin: 8px 0;
            padding: 0 1em;
            color: #6a737d;
            border-left: 0.25em solid #dfe2e5;
        }

        code {
            background: #f6f8fa;
            border-radius: 3px;
            padding: 2px 6px;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 0.85em;
        }

        pre {
            background: #2d2d2d;
            border-radius: 6px;
            padding: 10px;
            overflow: auto;
            margin-bottom: 8px;
        }

        pre code {
            background: transparent;
            padding: 0;
            color: #f8f8f2;
        }

        table {
            border-collapse: collapse;
            margin: 8px 0;
            width: 100%;
        }

        th, td {
            border: 1px solid #dfe2e5;
            padding: 3px 8px;
        }

        th {
            background: #f6f8fa;
            font-weight: 600;
        }

        a {
            color: #0366d6;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .reference-entry {
            margin-bottom: 1.25em;
            line-height: 1.55;
        }

        .reference-entry strong a {
            color: inherit;
            font-weight: 600;
            text-decoration: none;
        }

        .reference-entry strong a:hover {
            text-decoration: underline;
        }

        img {
            max-width: 100%;
            height: auto;
            border-radius: 4px;
            margin: 8px 0;
        }

        figure {
            margin: 16px auto;
            text-align: center;
            max-width: 100%;
            width: 100%;
        }

        figure > img {
            display: block;
            width: 100%;
            max-width: 100%;
            height: auto;
            margin-left: auto;
            margin-right: auto;
        }

        /*
         * Architecture SVGs: largest diagram (1292px artboard) fills the content column;
         * others scale by intrinsic width ratio via --intrinsic-w.
         */
        figure.arch-diagram {
            container-type: inline-size;
            width: 100%;
        }

        figure.arch-diagram > img {
            width: calc(var(--intrinsic-w, 1292) * 100cqw / 1292);
            max-width: 100%;
            height: auto;
        }

        figcaption {
            margin: 10px auto 0;
            max-width: 100%;
            width: 100%;
            padding: 0;
            text-align: center;
            color: #57606a;
            font-size: 14px;
            line-height: 1.65;
        }

        figcaption .MathJax,
        figcaption mjx-container {
            display: inline !important;
            max-width: 100%;
            margin: 0;
            overflow: visible;
            white-space: normal;
        }

        figcaption .fig-label {
            font-weight: 600;
            color: #24292f;
        }

        hr {
            border: 0;
            border-top: 1px solid #eaecef;
            margin: 10px 0;
        }
        
        html {
            scroll-behavior: smooth;
        }
    </style>
</head>
<body>
    <div class="container" id="content">
        <p>Loading markdown...</p>
    </div>

    <script>
        const PAGE_NAME = 'world-cup-predictor.html';

        const getPageBase = () => {
            const path = window.location.pathname;
            if (path.endsWith(PAGE_NAME)) {
                return path.slice(0, -PAGE_NAME.length);
            }
            return path.endsWith('/') ? path : path.replace(/[^/]*$/, '');
        };

        const resolveAssetPath = (src) => {
            if (!src || /^https?:\/\//i.test(src) || src.startsWith('data:')) return src;
            const clean = src.replace(/^\//, '');
            return `${getPageBase()}${clean}`;
        };

        // Configure marked options (let Prism handle highlighting after render)
        marked.setOptions({
            breaks: true,
            gfm: true
        });

        const repairMathInner = (inner) => {
            // GFM can italicize `_…_`, strip `\` before `%`, and leave HTML entities from markdown.
            return inner
                .replace(/<\/?em>/gi, '')
                .replace(/&#95;/g, '_')
                .replace(/&amp;/g, '&')
                .replace(/&gt;/g, '>')
                .replace(/&lt;/g, '<')
                .replace(/(?<!\\)%/g, '\\%');
        };

        const repairInlineMath = (root) => {
            root.innerHTML = root.innerHTML.replace(/\\\(([\s\S]*?)\\\)/g, (_, inner) => {
                return `\\(${repairMathInner(inner)}\\)`;
            });
        };

        const repairDisplayMath = (root) => {
            root.innerHTML = root.innerHTML.replace(/\$\$([\s\S]*?)\$\$/g, (_, inner) => {
                return `$$${repairMathInner(inner)}$$`;
            });
        };

        const repairTableMath = (root) => {
            root.querySelectorAll('th, td').forEach((cell) => {
                cell.innerHTML = cell.innerHTML.replace(/\\\(([\s\S]*?)\\\)/g, (_, inner) => {
                    return `\\(${repairMathInner(inner)}\\)`;
                });
            });
        };

        const numberFigures = (root) => {
            const figures = Array.from(root.querySelectorAll('figure:not(.table-figure)'));
            let n = 0;

            figures.forEach((fig) => {
                const caption = fig.querySelector('figcaption');
                if (!caption) return;

                n += 1;

                if (!fig.id) fig.id = `fig-${n}`;

                if (caption.dataset.rawHtml == null) {
                    caption.dataset.rawHtml = caption.innerHTML;
                }

                caption.innerHTML = `<span class="fig-label">Figure ${n}.</span> ${caption.dataset.rawHtml}`;
            });
        };

        const normalizeRawHtmlMath = (root) => {
            // Raw HTML figcaptions pass through markdown escapes; fix \\( … \\) for MathJax.
            root.querySelectorAll('figcaption, .reference-entry').forEach((el) => {
                el.innerHTML = el.innerHTML
                    .replace(/\\\\\(/g, '\\(')
                    .replace(/\\\\\)/g, '\\)')
                    .replace(/\\\\\{/g, '\\{')
                    .replace(/\\\\\}/g, '\\}');
            });
        };

        // Fetch and render markdown from file
        const contentDiv = document.getElementById('content');
        
        fetch(resolveAssetPath('world-cup-predictor.md'))
            .then(response => response.text())
            .then(markdown => {
                // Let marked generate code fences with `language-xxx` classes,
                // then Prism will highlight them after insertion.
                contentDiv.innerHTML = marked.parse(markdown);

                const slugCounts = {};
                const toSlug = (text) => {
                    return (text || '')
                        .toLowerCase()
                        .trim()
                        .replace(/\s+/g, '-')
                        .replace(/[^a-z0-9\-]/g, '')
                        .replace(/\-+/g, '-')
                        .replace(/^\-+|\-+$/g, '');
                };

                const headings = contentDiv.querySelectorAll('h1,h2,h3,h4,h5,h6');
                headings.forEach((h) => {
                    const base = toSlug(h.textContent);
                    let slug = base;
                    if (slugCounts[base] != null) {
                        slugCounts[base] += 1;
                        slug = `${base}-${slugCounts[base]}`;
                    } else {
                        slugCounts[base] = 0;
                    }
                    if (!h.id) h.id = slug;
                });

                // Normalize image paths for subpath deployments (e.g. /portfolio/)
                const imgs = contentDiv.querySelectorAll('img');
                imgs.forEach((img) => {
                    let src = resolveAssetPath(img.getAttribute('src') || '');

                    if (/\.(mp4|mov|webm)$/i.test(src)) {
                        const makeSource = (url) => {
                            const s = document.createElement('source');
                            s.src = url;
                            const ext = (url.split('.').pop() || '').toLowerCase();
                            s.type = ext === 'mp4' ? 'video/mp4' : ext === 'webm' ? 'video/webm' : ext === 'mov' ? 'video/quicktime' : '';
                            return s;
                        };

                        const video = document.createElement('video');
                        video.setAttribute('controls', '');
                        video.setAttribute('playsinline', '');
                        video.setAttribute('preload', 'metadata');
                        video.style.width = '70%';
                        video.style.maxWidth = '70%';
                        video.style.borderRadius = '6px';

                        // Primary source (original)
                        video.appendChild(makeSource(src));
                        // Fallback attempt: same path but .mp4 (common browser support)
                        if (!/\.mp4$/i.test(src)) {
                            video.appendChild(makeSource(src.replace(/\.(mov|webm)$/i, '.mp4')));
                        }

                        // Fallback content if not supported or 404
                        const fallback = document.createElement('div');
                        fallback.style.fontSize = '14px';
                        fallback.style.marginTop = '8px';
                        fallback.innerHTML = `
                            <p>
                                Unable to play this video in your browser. 
                                <a href="${src}" download>Download video</a> or convert to MP4 (H.264/AAC).
                            </p>
                        `;
                        video.appendChild(fallback);

                        img.replaceWith(video);
                        return;
                    }

                    img.setAttribute('src', src);
                    img.setAttribute('loading', 'lazy');
                });

                // Normalize in-page anchor hrefs to our slug format
                const pageLinks = contentDiv.querySelectorAll('a[href^="#"]');
                pageLinks.forEach((a) => {
                    const rawHash = a.getAttribute('href');
                    const rawId = decodeURIComponent((rawHash || '').replace(/^#/, ''));
                    if (!rawId) return;
                    const normalized = `#${toSlug(rawId)}`;
                    a.setAttribute('href', normalized);
                });

                contentDiv.addEventListener('click', (e) => {
                    const link = e.target.closest && e.target.closest('a[href^="#"]');
                    if (!link) return;
                    const hash = decodeURIComponent(link.getAttribute('href'));
                    if (!hash || hash === '#' || hash.startsWith('#!')) return;
                    const id = hash.slice(1);
                    const normalizedId = toSlug(id);
                    const el = document.getElementById(normalizedId) || document.getElementById(id);
                    if (el) {
                        e.preventDefault();
                        el.scrollIntoView({ behavior: 'smooth', block: 'start' });
                        try { history.replaceState(null, '', `#${normalizedId}`); } catch (_) {}
                    }
                });

                // Architecture figures: native width from HTML attrs × shared viewport scale
                contentDiv.querySelectorAll('figure.arch-diagram img[width]').forEach((img) => {
                    const w = parseInt(img.getAttribute('width'), 10);
                    if (Number.isFinite(w) && w > 0) {
                        img.style.setProperty('--intrinsic-w', String(w));
                    }
                });

                numberFigures(contentDiv);
                normalizeRawHtmlMath(contentDiv);

                // Run Prism syntax highlighting on all code blocks within the content
                if (window.Prism && typeof window.Prism.highlightAllUnder === 'function') {
                    window.Prism.highlightAllUnder(contentDiv);
                }

                // Make inline citations like [1], [2], ... clickable and scroll to references.
                try {
                    const referencesHeading = Array.from(
                        contentDiv.querySelectorAll('h1,h2,h3,h4,h5,h6')
                    ).find(h => {
                        const t = (h.textContent || '').trim();
                        return t === '6 References' || t.endsWith('6 References') || t.includes('6 References');
                    });

                    let refsOl = null;
                    if (referencesHeading) {
                        let el = referencesHeading.nextElementSibling;
                        while (el) {
                            if (el.tagName === 'OL') { refsOl = el; break; }
                            el = el.nextElementSibling;
                        }
                    }

                    if (refsOl) {
                        const lis = refsOl.querySelectorAll('li');
                        lis.forEach((li, i) => {
                            li.id = `ref-${i + 1}`;
                        });
                    }

                    const citationRegex = /\[(\d+)\]/g;
                    const walker = document.createTreeWalker(contentDiv, NodeFilter.SHOW_TEXT);
                    const textNodes = [];

                    while (walker.nextNode()) {
                        const node = walker.currentNode;
                        const text = node.nodeValue || '';
                        if (!citationRegex.test(text)) continue;

                        if (refsOl && node.parentElement && node.parentElement.closest('ol') === refsOl) continue;
                        if (node.parentElement && node.parentElement.closest('a')) continue;

                        citationRegex.lastIndex = 0;
                        textNodes.push(node);
                    }

                    textNodes.forEach((node) => {
                        const text = node.nodeValue || '';
                        const matches = [...text.matchAll(/\[(\d+)\]/g)];
                        if (!matches.length) return;

                        const frag = document.createDocumentFragment();
                        let lastIndex = 0;

                        for (const m of matches) {
                            const full = m[0];
                            const n = m[1];
                            const start = m.index ?? 0;

                            frag.append(text.slice(lastIndex, start));

                            const a = document.createElement('a');
                            a.href = `#ref-${n}`;
                            a.textContent = full;
                            frag.appendChild(a);

                            lastIndex = start + full.length;
                        }

                        frag.append(text.slice(lastIndex));
                        node.parentNode.replaceChild(frag, node);
                    });
                } catch (e) {
                    console.error('Clickable citations setup failed:', e);
                }

                repairInlineMath(contentDiv);
                repairDisplayMath(contentDiv);
                repairTableMath(contentDiv);

                // Wait until MathJax is ready (async CDN load) before typesetting.
                const typesetWhenReady = async (root, timeoutMs = 20000) => {
                    const start = Date.now();
                    const tick = async () => {
                        if (window.MathJax && window.MathJax.startup && window.MathJax.startup.promise) {
                            try { await window.MathJax.startup.promise; } catch (_) {}
                        }
                        if (window.MathJax && window.MathJax.typesetPromise) {
                            try {
                                await window.MathJax.typesetPromise([root]);
                                return;
                            } catch (err) {
                                console.error('MathJax rendering error:', err);
                                return;
                            }
                        }
                        if (Date.now() - start > timeoutMs) return;
                        window.setTimeout(tick, 200);
                    };
                    tick();
                };
                typesetWhenReady(contentDiv);
            })
            .catch(error => {
                contentDiv.innerHTML = `<p style="color: red;">Error loading markdown file: ${error.message}</p>`;
            });
    </script>
</body>
</html>
