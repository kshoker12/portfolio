<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 336 236" width="100%" preserveAspectRatio="xMidYMid meet" style="background-color: #ffffff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
  <defs>
    <marker id="arrow-encoder-left" viewBox="0 0 12 12" refX="2" refY="6" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 12 0 L 0 6 L 12 12 z" fill="#C2410C" />
    </marker>
    <marker id="arrow-encoder-right" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#C2410C" />
    </marker>
    <filter id="shadow-md" x="-10%" y="-10%" width="125%" height="125%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.1" />
    </filter>
  </defs>
  <style>
    text, tspan {
      text-rendering: geometricPrecision;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    .text-title { font-weight: 700; font-size: 25px; fill: #0F172A; }
    .text-label { font-weight: 600; font-size: 17px; fill: #334155; }
  </style>
  <g transform="translate(28, 28)">
    <rect x="0" y="0" width="280" height="180" fill="#FFF7ED" stroke="#EA580C" stroke-width="3" rx="16" filter="url(#shadow-md)" />
    <text x="140" y="60" class="text-title" fill="#9A3412" text-anchor="middle">Transformer Encoder</text>
    <text x="140" y="90" font-size="17" class="text-label" fill="#C2410C" text-anchor="middle">(Operating on whole sequence)</text>
    <path d="M 60 140 L 220 140" fill="none" stroke="#C2410C" stroke-width="4" marker-start="url(#arrow-encoder-left)" marker-end="url(#arrow-encoder-right)" />
    <text x="140" y="172" font-size="17" class="text-label" fill="#C2410C" text-anchor="middle">Bi-directional</text>
  </g>
</svg>
