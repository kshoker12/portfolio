<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 198" width="100%" preserveAspectRatio="xMidYMid meet" style="background-color: #ffffff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
  <defs>
    <filter id="shadow-sm" x="-10%" y="-10%" width="125%" height="125%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15" />
    </filter>
  </defs>
  <style>
    text, tspan {
      text-rendering: geometricPrecision;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    .text-label { font-weight: 600; font-size: 17px; fill: #334155; }
  </style>
  <g transform="translate(28, 28)">
    <rect x="64" y="64" width="140" height="78" fill="#ffffff" stroke="#0F172A" stroke-width="2" />
    <text x="192" y="130" font-size="16" class="text-label" text-anchor="end">Bar K</text>

    <rect x="32" y="32" width="140" height="78" fill="#ffffff" stroke="#0F172A" stroke-width="2" filter="url(#shadow-sm)" />
    <text x="160" y="98" font-size="16" class="text-label" text-anchor="end">Bar 2</text>

    <rect x="0" y="0" width="140" height="78" fill="#ffffff" stroke="#0F172A" stroke-width="2" filter="url(#shadow-sm)" />
    <text x="15" y="36" font-size="33" fill="#0F172A">♫</text>
    <text x="128" y="66" font-size="16" class="text-label" text-anchor="end">Bar 1</text>
  </g>
</svg>
