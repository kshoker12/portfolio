  <text x="200" y="106" font-family="Cambria Math, Times New Roman, serif" font-size="15" font-weight="500" text-anchor="middle" fill="#155e75">
    <tspan font-style="italic">C</tspan><tspan font-size="9" baseline-shift="sub">k</tspan><tspan> = Linear(</tspan>
    <tspan font-style="italic">A</tspan><tspan font-size="9" baseline-shift="sub">k</tspan><tspan>) ∈ </tspan>
