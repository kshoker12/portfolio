  <rect x="23" y="38" width="502" height="72" rx="6" fill="#ffffff" stroke="#E8A8A8" stroke-width="2" />
  <text x="274.0" y="84.0" font-family="Cambria Math, Times New Roman, serif" font-size="30" font-weight="500" text-anchor="middle" fill="#990000"><tspan>𝓛</tspan><tspan font-size="14" baseline-shift="sub">KL</tspan><tspan> = </tspan><tspan font-style="italic">β</tspan><tspan> · </tspan><tspan font-size="16">D</tspan><tspan font-size="14" baseline-shift="sub">KL</tspan><tspan>(</tspan><tspan font-style="italic">Q</tspan><tspan font-size="14" baseline-shift="sub">φ</tspan><tspan>(</tspan><tspan font-style="italic">Z</tspan><tspan font-size="14" baseline-shift="sub">p</tspan><tspan> ∣ </tspan><tspan font-style="italic">X</tspan><tspan>) ∥ </tspan><tspan>𝒩</tspan><tspan>(0, </tspan><tspan font-style="italic">I</tspan><tspan font-size="11" baseline-shift="sub">128</tspan><tspan>))</tspan></text>
  <text x="274.0" y="132" font-family="Arial, sans-serif" font-size="17" font-weight="600" fill="#334155" text-anchor="middle">KL Regularization</text>
  <text x="274.0" y="150" font-family="Arial, sans-serif" font-size="14" fill="#475569" text-anchor="middle">Penalizes deviation of approximate posterior from standard normal prior</text>
