  <text x="194.0" y="84.0" font-family="Cambria Math, Times New Roman, serif" font-size="30" font-weight="500" text-anchor="middle" fill="#6611AA"><tspan font-style="italic">C</tspan><tspan font-size="18" baseline-shift="sub">k</tspan><tspan> = Linear(</tspan><tspan font-style="italic">A</tspan><tspan font-size="18" baseline-shift="sub">k</tspan><tspan>) ∈ </tspan><tspan>ℝ</tspan><tspan font-size="14" baseline-shift="super">512</tspan></text>
  <text x="194.0" y="132" font-family="Arial, sans-serif" font-size="17" font-weight="600" fill="#334155" text-anchor="middle">Linear Projection</text>
  <text x="194.0" y="150" font-family="Arial, sans-serif" font-size="14" fill="#475569" text-anchor="middle">Projects <tspan font-family="Georgia, serif" font-style="italic">A</tspan><tspan font-family="Cambria Math, Times New Roman, serif" font-size="11" baseline-shift="sub">k</tspan> into bar control <tspan font-family="Georgia, serif" font-style="italic">C</tspan><tspan font-family="Cambria Math, Times New Roman, serif" font-size="11" baseline-shift="sub">k</tspan><tspan font-family="Cambria Math, Times New Roman, serif"> ∈ ℝ</tspan><tspan font-family="Cambria Math, Times New Roman, serif" font-size="11" baseline-shift="super">512</tspan></text>
